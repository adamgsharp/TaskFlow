<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TaskFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-h: 56px;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --primary: #6366f1;
      --primary-h: #4f46e5;
      --primary-light: #eef2ff;
      --danger: #ef4444;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }

    /* ── App layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #header {
      height: var(--header-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      flex-shrink: 0; z-index: 100;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .header-left { flex: 1; display: flex; align-items: center; }
    .header-center { display: flex; justify-content: center; }
    .header-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

    .logo { display: flex; align-items: center; gap: 7px; }
    .logo-text { font-weight: 700; font-size: 16px; color: var(--text); letter-spacing: -0.3px; }

    .view-toggle {
      display: flex; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px; padding: 3px; gap: 2px;
    }
    .toggle-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border: none; background: transparent;
      border-radius: 5px; font-size: 13px; font-weight: 500;
      color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .toggle-btn:hover { color: var(--text); }
    .toggle-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    .header-progress { display: flex; align-items: center; gap: 7px; }
    .header-progress-bar { width: 72px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .header-progress-fill { height: 100%; background: linear-gradient(90deg,#6366f1,#22c55e); border-radius: 99px; transition: width .4s; }
    .header-progress-text { font-size: 12px; font-weight: 600; color: var(--text2); min-width: 28px; }

    .add-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; background: var(--primary); color: white;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s, transform .1s;
      white-space: nowrap; box-shadow: 0 1px 4px rgba(99,102,241,.3);
    }
    .add-btn:hover { background: var(--primary-h); transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }
    .add-btn-icon { font-size: 18px; line-height: 1; }

    /* ── Main ── */
    #main { flex: 1; overflow: hidden; position: relative; }

    /* ── Flow view ── */
    #flow-view { width: 100%; height: 100%; position: relative; }
    #flow-outer { width: 100%; height: 100%; overflow: hidden; position: relative; cursor: default; }
    #flow-outer.panning { cursor: grabbing; }
    #flow-outer.marqueeing { cursor: crosshair; }
    body.pan-mode #flow-outer { cursor: grab; }
    body.pan-mode #flow-outer.panning { cursor: grabbing; }
    #flow-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    #edges-svg { position: absolute; top: 0; left: 0; width: 1px; height: 1px; overflow: visible; }
    .edge-hit { cursor: crosshair; }

    /* Portrait auto-arrange: ports on top/bottom of nodes */
    .portrait-layout .port-left {
      left: 50%; right: auto; top: -7px; bottom: auto;
      transform: translateX(-50%);
    }
    .portrait-layout .port-right {
      right: auto; left: 50%; top: auto; bottom: -7px;
      transform: translateX(-50%);
    }

    .flow-node {
      position: absolute; width: 220px; height: 64px;
      border: 2px solid; border-radius: 10px;
      display: flex; align-items: center; padding: 10px 14px; gap: 10px;
      cursor: pointer; box-sizing: border-box; user-select: none;
      transition: box-shadow .15s;
    }
    .flow-node:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .flow-node.dragging { box-shadow: 0 8px 24px rgba(0,0,0,.18); cursor: grabbing; }

    .node-cb {
      width: 18px; height: 18px; border-radius: 5px; border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; transition: all .15s; background: white;
    }
    .node-title {
      font-size: 13px; font-weight: 500; color: var(--text); flex: 1;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; line-height: 1.35;
    }
    .node-title.done { text-decoration: line-through; color: var(--text3); }

    .edge-done { stroke-dasharray: 6 4; stroke-opacity: 0.22; }

    #flow-toolbar {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
    }
    .tb-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; background: white; border: 1px solid var(--border);
      border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.07); transition: all .15s;
      white-space: nowrap;
    }
    .tb-btn:hover { background: var(--primary-light); color: var(--primary); border-color: #c7d2fe; }
    .tb-btn:disabled { opacity: .38; cursor: default; pointer-events: none; }
    .tb-sep { height: 1px; background: var(--border); margin: 2px 0; }

    /* ── List view ── */
    #list-view { height: 100%; overflow-y: auto; padding: 20px; }
    .list-inner { max-width: 820px; margin: 0 auto; }

    .list-prog-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .list-prog-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .list-prog-fill { height: 100%; background: linear-gradient(90deg,#6366f1,#22c55e); border-radius: 99px; transition: width .4s; }
    .list-prog-label { font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; }

    .list-layer { margin-bottom: 24px; }
    .list-layer-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .list-layer-name { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .list-layer-ct { font-size: 12px; color: var(--text3); }

    .list-tasks { display: flex; flex-direction: column; gap: 8px; }

    .list-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 15px; border: 1.5px solid; border-radius: 10px;
      background: white; cursor: pointer; transition: box-shadow .15s, transform .1s;
    }
    .list-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); transform: translateY(-1px); }

    .list-cb {
      width: 18px; height: 18px; border-radius: 5px; border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; margin-top: 1px; background: white; transition: all .15s;
    }

    .list-body { flex: 1; min-width: 0; }
    .list-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .list-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .list-title.done { text-decoration: line-through; color: var(--text3); }

    .list-badge { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    .list-deps { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
    .dep-label { font-size: 11px; color: var(--text3); font-weight: 500; }
    .dep-chip {
      display: inline-flex; align-items: center; padding: 2px 7px;
      border-radius: 99px; font-size: 11px; font-weight: 500;
    }
    .dep-pre { background: #fef3c7; color: #92400e; }
    .dep-post { background: #e0f2fe; color: #075985; }

    .list-empty { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 14px; }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.45);
      backdrop-filter: blur(2px); display: none;
      align-items: center; justify-content: center; z-index: 1000; padding: 16px;
    }
    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px;
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,.15); overflow: hidden;
    }
    .modal-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .modal-x {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: var(--text3); font-size: 22px;
      cursor: pointer; border-radius: 6px; line-height: 1; transition: background .15s;
    }
    .modal-x:hover { background: var(--bg); color: var(--text); }

    .modal-body { padding: 18px 24px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; flex: 1; }

    .field-grp { display: flex; flex-direction: column; gap: 5px; }
    .field-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
    .field-sub { font-size: 12px; color: var(--text2); }
    .text-input {
      padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 14px; color: var(--text); background: var(--surface);
      transition: border-color .15s, box-shadow .15s; outline: none; width: 100%;
    }
    .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .text-input.err { border-color: var(--danger); }
    .err-msg { font-size: 12px; color: var(--danger); }

    .chip-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; line-height: 1.4;
    }
    .chip-pre { background: #fef3c7; color: #92400e; }
    .chip-post { background: #e0f2fe; color: #075985; }
    .chip-rm {
      display: flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border: none; background: transparent;
      cursor: pointer; font-size: 15px; line-height: 1; color: inherit; opacity: .6;
      border-radius: 50%; padding: 0; transition: opacity .15s;
    }
    .chip-rm:hover { opacity: 1; }

    .ms-wrap { position: relative; }
    .ms-input {
      width: 100%; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 14px; color: var(--text); background: var(--surface);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .ms-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    /* dropdown uses position:fixed, positioned via JS */
    .ms-dropdown {
      position: fixed; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); list-style: none;
      z-index: 9999; overflow: hidden; max-height: 210px; overflow-y: auto; display: none;
    }
    .ms-opt {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 13px; font-size: 13px; color: var(--text); cursor: pointer; transition: background .1s;
    }
    .ms-opt:hover { background: var(--primary-light); }
    .opt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .modal-ftr {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 6px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-ftr-r { display: flex; gap: 8px; }

    .btn {
      padding: 9px 17px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all .15s;
      display: inline-flex; align-items: center;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: transparent; color: var(--danger); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fef2f2; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #f8fafc;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500; z-index: 9999;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Selection ── */
    .flow-node.selected { box-shadow: 0 0 0 2.5px var(--primary), 0 2px 10px rgba(0,0,0,.1) !important; }

    /* ── Marquee ── */
    #marquee-rect {
      position: absolute; pointer-events: none; z-index: 20;
      border: 1.5px dashed var(--primary); background: rgba(99,102,241,.07);
      border-radius: 3px; display: none;
    }

    /* ── Inline rename ── */
    .node-title-input {
      flex: 1; font-size: 13px; font-weight: 500; color: var(--text);
      border: none; outline: none; background: transparent;
      line-height: 1.35; padding: 0; min-width: 0;
    }

    /* ── Node pencil rename button ── */
    .node-edit-btn {
      position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
      width: 16px; height: 16px;
      display: none; align-items: center; justify-content: center;
      border: none; background: transparent; padding: 0;
      cursor: pointer; color: var(--text3); border-radius: 3px;
      transition: color .15s, background .15s;
    }
    .flow-node:hover .node-edit-btn { display: flex; }
    .node-edit-btn:hover { color: var(--primary); background: var(--primary-light); }

    /* ── Connection ports ── */
    .node-port {
      position: absolute; width: 13px; height: 13px; border-radius: 50%;
      background: white; border: 2px solid #94a3b8;
      top: 50%; transform: translateY(-50%);
      cursor: crosshair; z-index: 5;
      transition: border-color .15s, background .15s, box-shadow .15s, transform .15s;
    }
    .node-port:hover { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 4px rgba(99,102,241,.2); transform: translateY(-50%) scale(1.25); }
    .port-left { left: -7px; }
    .port-right { right: -7px; }
    .flow-node.conn-target { box-shadow: 0 0 0 3px rgba(99,102,241,.5) !important; border-color: var(--primary) !important; }

    /* ── Hide-done toggle ── */
    .hide-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; background: transparent;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .hide-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg); }
    .hide-btn.active { background: var(--primary-light); color: var(--primary); border-color: #c7d2fe; }

    /* ── Mobile ── */
    @media (max-width: 560px) {
      .logo-text { display: none; }
      .header-progress { display: none; }
      .add-btn-text { display: none; }
      .hide-btn-text { display: none; }
      .add-btn { padding: 8px 10px; }
      .toggle-btn { padding: 5px 8px; font-size: 12px; }
      #modal-overlay { align-items: flex-end; padding: 0; }
      .modal { border-radius: 16px 16px 0 0; max-height: 95vh; }
      .list-row { flex-direction: column; align-items: flex-start; gap: 2px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="1" y="4" width="6" height="14" rx="2" fill="#6366f1"/>
          <rect x="8.5" y="7" width="5" height="8" rx="2" fill="#818cf8"/>
          <rect x="15" y="9" width="6" height="4" rx="2" fill="#a5b4fc"/>
          <line x1="7" y1="11" x2="8.5" y2="11" stroke="#6366f1" stroke-width="1.5"/>
          <line x1="13.5" y1="11" x2="15" y2="11" stroke="#818cf8" stroke-width="1.5"/>
        </svg>
        <span class="logo-text">TaskFlow</span>
      </div>
    </div>
    <div class="header-center">
      <div class="view-toggle">
        <button id="btn-flow" class="toggle-btn active" onclick="setView('flow')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x=".5" y="1" width="3" height="11" rx="1.5" fill="currentColor"/><rect x="5" y="3" width="3" height="7" rx="1.5" fill="currentColor"/><rect x="9.5" y="5" width="3" height="3" rx="1.5" fill="currentColor"/></svg>
          Flow
        </button>
        <button id="btn-list" class="toggle-btn" onclick="setView('list')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2" width="11" height="2" rx="1" fill="currentColor"/><rect x="1" y="5.5" width="11" height="2" rx="1" fill="currentColor"/><rect x="1" y="9" width="7" height="2" rx="1" fill="currentColor"/></svg>
          List
        </button>
      </div>
    </div>
    <div class="header-right">
      <div id="hdr-prog" class="header-progress" style="display:none">
        <div class="header-progress-bar"><div id="hdr-prog-fill" class="header-progress-fill"></div></div>
        <span id="hdr-prog-text" class="header-progress-text"></span>
      </div>
      <button id="btn-hide" class="hide-btn" onclick="toggleHideCompleted()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3C4 3 1.5 7 1.5 7S4 11 7 11s5.5-4 5.5-4S10 3 7 3z" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="7" cy="7" r="1.8" fill="currentColor"/></svg>
        <span class="hide-btn-text">Hide Done</span>
      </button>
      <button class="add-btn" onclick="openTaskModal(null)">
        <span class="add-btn-icon">+</span>
        <span class="add-btn-text">Add Task</span>
      </button>
    </div>
  </header>

  <main id="main">
    <div id="flow-view">
      <div id="flow-outer">
        <div id="flow-canvas">
          <svg id="edges-svg"></svg>
        </div>
        <div id="marquee-rect"></div>
      </div>
      <div id="flow-toolbar">
        <button class="tb-btn" id="btn-undo" onclick="undo()" title="Undo (Ctrl+Z)" disabled>
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 5.5H8.5C10.4 5.5 12 7.1 12 9S10.4 12.5 8.5 12.5H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><path d="M4.5 3L2 5.5L4.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          Undo
        </button>
        <button class="tb-btn" id="btn-redo" onclick="redo()" title="Redo (Ctrl+Shift+Z)" disabled>
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 5.5H4.5C2.6 5.5 1 7.1 1 9S2.6 12.5 4.5 12.5H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><path d="M8.5 3L11 5.5L8.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          Redo
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="autoArrange()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="5.5" y="3" width="3" height="7" rx="1" fill="currentColor"/><rect x="10" y="5" width="3" height="3" rx="1" fill="currentColor"/></svg>
          Auto Arrange
        </button>
        <button class="tb-btn" onclick="cleanUp()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M2 6.5h6M2 9.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Clean Up
        </button>
        <button class="tb-btn" onclick="fitView()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="4" height="4" rx=".8" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="8" y="1" width="4" height="4" rx=".8" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="1" y="8" width="4" height="4" rx=".8" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="8" y="8" width="4" height="4" rx=".8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Fit View
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="shareBoard()">

  <path id="ghost-path" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-dasharray="7 4" opacity="0.85"/>
</svg>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
const NW = 220, NH = 64, H_GAP = 110, V_GAP = 28, PAD = 50;

const SC = {
  completed: { bg:'#f8fafc', bd:'#cbd5e1', dot:'#94a3b8', txt:'#94a3b8' },
  available: { bg:'#eff6ff', bd:'#3b82f6', dot:'#3b82f6', txt:'#1d4ed8' },
  blocked:   { bg:'#f8fafc', bd:'#cbd5e1', dot:'#94a3b8', txt:'#64748b' },
};

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let S;

function initState() {
  try {
    const raw = localStorage.getItem('taskflow-v2');
    if (raw) { S = JSON.parse(raw); if (S.hideCompleted===undefined) S.hideCompleted=false; return; }
  } catch(e) {}
  S = {
    view: 'flow',
    hideCompleted: false,
    tasks: {
      t1:{ id:'t1', title:'Research market',        completed:false, prereqs:[],           dependents:['t2','t3'] },
      t2:{ id:'t2', title:'Define MVP features',    completed:false, prereqs:['t1'],       dependents:['t4','t5'] },
      t3:{ id:'t3', title:'Competitor analysis',    completed:false, prereqs:['t1'],       dependents:['t4'] },
      t4:{ id:'t4', title:'Design UI mockups',      completed:false, prereqs:['t2','t3'],  dependents:['t6'] },
      t5:{ id:'t5', title:'Set up dev environment', completed:false, prereqs:['t2'],       dependents:['t6','t7'] },
      t6:{ id:'t6', title:'Build frontend',         completed:false, prereqs:['t4','t5'],  dependents:['t8'] },
      t7:{ id:'t7', title:'Build backend API',      completed:false, prereqs:['t5'],       dependents:['t8'] },
      t8:{ id:'t8', title:'QA & testing',           completed:false, prereqs:['t6','t7'],  dependents:['t9'] },
      t9:{ id:'t9', title:'Deploy & launch',        completed:false, prereqs:['t8'],       dependents:[] },
    }
  };
  doLayout();
  persist();
}

// ════════════════════════════════════════════════════════════
// HISTORY (undo / redo)
// ════════════════════════════════════════════════════════════
let history = [], historyIndex = -1, skipHistory = false;
let portraitLayout = false; // set by doLayout, used by renderEdges + computeEdgePath

function persist() {
  const json = JSON.stringify(S);
  if (!skipHistory) {
    const snap = JSON.stringify(S.tasks);
    if (snap !== history[historyIndex]) {
      history = history.slice(0, historyIndex + 1);
      history.push(snap);
      if (history.length > 100) { history.shift(); }
      else { historyIndex = history.length - 1; }
    }
  }
  try { localStorage.setItem('taskflow-v2', json); } catch(e) {}
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  skipHistory = true;
  S.tasks = JSON.parse(history[historyIndex]);
  skipHistory = false;
  persist(); render();
}

function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  skipHistory = true;
  S.tasks = JSON.parse(history[historyIndex]);
  skipHistory = false;
  persist(); render();
}

function updateUndoButtons() {
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if (u) u.disabled = historyIndex <= 0;
  if (r) r.disabled = historyIndex >= history.length - 1;
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
function status(task) {
  if (task.completed) return 'completed';
  return task.prereqs.every(id => S.tasks[id]?.completed) ? 'available' : 'blocked';
}

function wouldCycle(fromId, toId) {
  const seen = new Set(), stack = [toId];
  while (stack.length) {
    const c = stack.pop();
    if (c === fromId) return true;
    if (seen.has(c)) continue;
    seen.add(c);
    (S.tasks[c]?.dependents||[]).forEach(d => stack.push(d));
  }
  return false;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════════
// LAYOUT
// ════════════════════════════════════════════════════════════
function doLayout() {
  const allTasks = Object.values(S.tasks);
  if (!allTasks.length) return;

  // When Hide Done is on, lay out only visible (non-completed) tasks.
  // Available tasks (all prereqs finished) become layer 0 — the leftmost column.
  // When Hide Done is off, include every task with standard longest-path layers.
  const tasks   = S.hideCompleted ? allTasks.filter(t => !t.completed) : allTasks;
  const taskSet = new Set(tasks.map(t => t.id));

  // Visible edge helpers — only traverse edges between laid-out tasks
  const vPre = id => (S.tasks[id]?.prereqs    ||[]).filter(p => taskSet.has(p));
  const vDep = id => (S.tasks[id]?.dependents ||[]).filter(d => taskSet.has(d));

  // 1. Layer assignment
  const layers = {};
  // Roots: when hiding done, tasks whose prereqs are ALL completed (not in taskSet).
  //        otherwise, tasks with zero prereqs.
  const roots = S.hideCompleted
    ? tasks.filter(t => t.prereqs.every(pid => !taskSet.has(pid)))
    : tasks.filter(t => t.prereqs.length === 0);

  const q = roots.map(t => ({id:t.id, d:0}));
  while (q.length) {
    const {id, d} = q.shift();
    if (layers[id] === undefined || d > layers[id]) {
      layers[id] = d;
      vDep(id).forEach(dep => q.push({id:dep, d:d+1}));
    }
  }
  tasks.forEach(t => { if (layers[t.id] === undefined) layers[t.id] = 0; });

  // 2. Group by layer
  const byLayer = {};
  tasks.forEach(t => { const d=layers[t.id]; (byLayer[d]||(byLayer[d]=[])).push(t.id); });
  const layerNums = Object.keys(byLayer).map(Number).sort((a,b) => a-b);

  // 3. Barycentric crossing minimisation — 4 forward+backward passes (visible edges only)
  function med(arr) {
    if (!arr.length) return 0;
    const s = [...arr].sort((a,b) => a-b), m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
  }
  for (let pass = 0; pass < 4; pass++) {
    for (let li = 1; li < layerNums.length; li++) {
      const pos = {}; byLayer[layerNums[li-1]].forEach((id,i) => { pos[id]=i; });
      byLayer[layerNums[li]].sort((a,b) =>
        med(vPre(a).map(p=>pos[p]).filter(v=>v!=null)) -
        med(vPre(b).map(p=>pos[p]).filter(v=>v!=null)));
    }
    for (let li = layerNums.length-2; li >= 0; li--) {
      const pos = {}; byLayer[layerNums[li+1]].forEach((id,i) => { pos[id]=i; });
      byLayer[layerNums[li]].sort((a,b) =>
        med(vDep(a).map(d=>pos[d]).filter(v=>v!=null)) -
        med(vDep(b).map(d=>pos[d]).filter(v=>v!=null)));
    }
  }

  // 3b. Pairwise swap refinement — after the median heuristic gets us close,
  //     explicitly count crossings and swap adjacent nodes whenever a swap
  //     reduces the total. Repeat until no swap helps (up to 20 sweeps).
  function countCrossings(layer, adjLayer, edgeFn) {
    if (!adjLayer || !adjLayer.length) return 0;
    const pos = {};
    adjLayer.forEach((id, i) => { pos[id] = i; });
    const edges = [];
    layer.forEach((id, i) => {
      edgeFn(id).forEach(nid => { if (pos[nid] !== undefined) edges.push([i, pos[nid]]); });
    });
    let c = 0;
    for (let i = 0; i < edges.length-1; i++)
      for (let j = i+1; j < edges.length; j++)
        if ((edges[i][0]-edges[j][0]) * (edges[i][1]-edges[j][1]) < 0) c++;
    return c;
  }
  for (let sweep = 0; sweep < 20; sweep++) {
    let anyImproved = false;
    for (let li = 0; li < layerNums.length; li++) {
      const ids = byLayer[layerNums[li]];
      if (ids.length < 2) continue;
      const L = li > 0                    ? byLayer[layerNums[li-1]] : [];
      const R = li < layerNums.length-1   ? byLayer[layerNums[li+1]] : [];
      let swapped = true;
      while (swapped) {
        swapped = false;
        for (let i = 0; i < ids.length-1; i++) {
          const before = countCrossings(ids,L,vPre) + countCrossings(ids,R,vDep);
          [ids[i], ids[i+1]] = [ids[i+1], ids[i]];
          const after  = countCrossings(ids,L,vPre) + countCrossings(ids,R,vDep);
          if (after < before) { swapped = true; anyImproved = true; }
          else [ids[i], ids[i+1]] = [ids[i+1], ids[i]]; // revert
        }
      }
    }
    if (!anyImproved) break;
  }

  // 4. Orientation
  const portrait = window.innerWidth < window.innerHeight && window.innerWidth < 640;
  portraitLayout = portrait;
  const canvas = document.getElementById('flow-canvas');
  if (canvas) canvas.classList.toggle('portrait-layout', portrait);

  if (portrait) {
    // Portrait: layers top→bottom, nodes spread left→right — no gravity pass needed
    Object.entries(byLayer).forEach(([dl, ids]) => {
      const y = PAD + parseInt(dl) * (NH + H_GAP);
      ids.forEach((id, i) => { S.tasks[id].x = PAD + i*(NW+H_GAP); S.tasks[id].y = y; });
    });
    return;
  }

  // 5. Gravity-based Y positioning (landscape only).
  //    After barycentric ordering fixes the vertical ORDER, iteratively pull each
  //    node toward the median Y of its visible neighbours so connected nodes
  //    float to the same height and gaps open up where edges need to pass through.
  const minGap = NH + V_GAP;

  // Seed with even spacing so the first gravity pass has a stable reference
  const yPos = {};
  Object.entries(byLayer).forEach(([dl, ids]) => {
    ids.forEach((id, i) => { yPos[id] = PAD + i * minGap; });
  });

  for (let iter = 0; iter < 8; iter++) {
    const nextY = {};
    Object.entries(byLayer).forEach(([dl, ids]) => {
      // Gravity targets: median Y of all visible neighbours across adjacent layers
      const targets = ids.map(id => {
        const nys = [...vPre(id), ...vDep(id)]
          .map(nid => yPos[nid]).filter(v => v !== undefined);
        if (!nys.length) return {id, target: yPos[id]};
        const s = nys.sort((a,b)=>a-b), m = Math.floor(s.length/2);
        return {id, target: s.length%2 ? s[m] : (s[m-1]+s[m])/2};
      });

      // Forward pass: place at target but push down to honour minimum gap
      let floor = PAD - minGap;
      const placed = targets.map(({id, target}) => {
        const y = Math.max(target, floor + minGap);
        floor = y;
        return {id, y};
      });

      // Backward pass: pull back up where headroom allows
      let ceil = Infinity;
      for (let i = placed.length-1; i >= 0; i--) {
        placed[i].y = Math.min(placed[i].y, ceil - minGap);
        ceil = placed[i].y;
      }

      placed.forEach(({id, y}) => { nextY[id] = Math.max(PAD, y); });
    });
    Object.assign(yPos, nextY);
  }

  // 6. Write final positions
  Object.entries(byLayer).forEach(([dl, ids]) => {
    const x = PAD + parseInt(dl) * (NW + H_GAP);
    ids.forEach(id => { S.tasks[id].x = x; S.tasks[id].y = yPos[id]; });
  });
}

// ════════════════════════════════════════════════════════════
// SYNC (bidirectional relationships)
// ════════════════════════════════════════════════════════════
function syncRel(taskId, newPre, newPost) {
  const t = S.tasks[taskId];
  const oldPre = t?.prereqs||[], oldPost = t?.dependents||[];

  oldPre.filter(id=>!newPre.includes(id)).forEach(id=>{
    if(S.tasks[id]) S.tasks[id].dependents = S.tasks[id].dependents.filter(d=>d!==taskId);
  });
  newPre.filter(id=>!oldPre.includes(id)).forEach(id=>{
    if(S.tasks[id]&&!S.tasks[id].dependents.includes(taskId)) S.tasks[id].dependents.push(taskId);
  });
  oldPost.filter(id=>!newPost.includes(id)).forEach(id=>{
    if(S.tasks[id]) S.tasks[id].prereqs = S.tasks[id].prereqs.filter(p=>p!==taskId);
  });
  newPost.filter(id=>!oldPost.includes(id)).forEach(id=>{
    if(S.tasks[id]&&!S.tasks[id].prereqs.includes(taskId)) S.tasks[id].prereqs.push(taskId);
  });
}

// ════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════
function addTask(title, pre, post) {
  const id = 'tk' + Date.now();
  S.tasks[id] = { id, title, completed:false, prereqs:[], dependents:[] };
  syncRel(id, pre, post);
  S.tasks[id].prereqs = pre;
  S.tasks[id].dependents = post;
  if(pendingAddPos) {
    S.tasks[id].x = pendingAddPos.x - NW/2;
    S.tasks[id].y = pendingAddPos.y - NH/2;
    pendingAddPos = null;
  } else {
    doLayout();
  }
  persist(); render();
}

function editTask(id, title, pre, post) {
  syncRel(id, pre, post);
  Object.assign(S.tasks[id], { title, prereqs:pre, dependents:post });
  persist(); render();
}

function toggleTask(id) {
  S.tasks[id].completed = !S.tasks[id].completed;
  persist(); render();
}

function deleteTask(id) {
  const t = S.tasks[id];
  t.prereqs.forEach(pid => { if(S.tasks[pid]) S.tasks[pid].dependents = S.tasks[pid].dependents.filter(d=>d!==id); });
  t.dependents.forEach(did => { if(S.tasks[did]) S.tasks[did].prereqs = S.tasks[did].prereqs.filter(p=>p!==id); });
  delete S.tasks[id];
  selectedIds.delete(id);
  persist(); render();
}

function setView(v) {
  S.view = v;
  persist(); render();
}

function toggleHideCompleted() {
  S.hideCompleted = !S.hideCompleted;
  persist(); render();
}

function autoArrange() {
  doLayout(); persist();
  if (S.view==='flow') { renderFlow(); fitView(); }
}

// Clean Up: snap each node to the nearest grid point, preserving arrangement.
// x — cluster existing column x-values, snap to nearest cluster centre.
// y — half-step grid (every (NH+V_GAP)/2) so nodes can sit between rows too.
function cleanUp() {
  const allTasks = Object.values(S.tasks);
  const tasks = S.hideCompleted ? allTasks.filter(t => !t.completed) : allTasks;
  if (!tasks.length) return;

  // 1. Derive column x-values by clustering current task x positions.
  //    Any two x values within NW*0.6 of each other belong to the same column.
  const sortedXs = tasks.map(t => t.x || 0).sort((a, b) => a - b);
  const clusters = [];
  sortedXs.forEach(x => {
    const last = clusters[clusters.length - 1];
    if (!last || x - last.sum / last.n > NW * 0.6) clusters.push({ sum: x, n: 1 });
    else { last.sum += x; last.n++; }
  });
  const colXs = clusters.map(c => Math.round(c.sum / c.n));

  // 2. Half-step vertical grid: PAD + k * halfStep for k = 0, 1, 2, …
  const halfStep = (NH + V_GAP) / 2;

  // 3. Snap each task — x to nearest column, y to nearest half-step grid point.
  tasks.forEach(t => {
    const cx = t.x || 0, cy = t.y || 0;
    t.x = colXs.reduce((best, x) => Math.abs(x - cx) < Math.abs(best - cx) ? x : best);
    t.y = Math.max(PAD, Math.round((cy - PAD) / halfStep) * halfStep + PAD);
  });

  persist();
  if (S.view === 'flow') { renderFlow(); fitView(); }
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function render() {
  updateHdrProgress();
  document.getElementById('btn-flow').classList.toggle('active', S.view==='flow');
  document.getElementById('btn-list').classList.toggle('active', S.view==='list');
  document.getElementById('btn-hide').classList.toggle('active', !!S.hideCompleted);
  updateUndoButtons();

  if (S.view==='flow') {
    document.getElementById('flow-view').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
    renderFlow();
  } else {
    document.getElementById('flow-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderList();
  }
}

function updateHdrProgress() {
  const all = Object.values(S.tasks);
  const total = all.length, done = all.filter(t=>t.completed).length;
  const prog = document.getElementById('hdr-prog');
  if (total > 0) {
    prog.style.display = 'flex';
    const pct = Math.round((done/total)*100);
    document.getElementById('hdr-prog-fill').style.width = pct+'%';
    document.getElementById('hdr-prog-text').textContent = pct+'%';
  } else {
    prog.style.display = 'none';
  }
}

// ── Flow ──────────────────────────────────────────────────
function renderFlow() {
  const canvas = document.getElementById('flow-canvas');
  canvas.querySelectorAll('.flow-node').forEach(n=>n.remove());
  Object.values(S.tasks)
    .filter(t => !S.hideCompleted || !t.completed)
    .forEach(t => canvas.appendChild(makeNodeEl(t)));
  renderEdges();
}

function makeNodeEl(task) {
  const s = status(task), c = SC[s];
  const div = document.createElement('div');
  div.className = 'flow-node' + (selectedIds.has(task.id) ? ' selected' : '');
  div.dataset.id = task.id;
  const opacity = task.completed ? 'opacity:0.5;' : '';
  div.style.cssText = `left:${task.x||0}px;top:${task.y||0}px;background:${c.bg};border-color:${c.bd};${opacity}`;

  const cbStyle = `border-color:${task.completed?'#94a3b8':'#cbd5e1'};background:${task.completed?'#94a3b8':'white'}`;
  const check = task.completed
    ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    : '';

  div.innerHTML = `
    <div class="node-port port-left" data-port="pre" data-node="${task.id}"></div>
    <div class="node-cb" data-cb="${task.id}" style="${cbStyle}">${check}</div>
    <span class="node-title${task.completed?' done':''}">${esc(task.title)}</span>
    <button class="node-edit-btn" data-editname="${task.id}" title="Rename">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M7 1L9 3L3.5 8.5H1.5V6.5L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/></svg>
    </button>
    <div class="node-port port-right" data-port="post" data-node="${task.id}"></div>
  `;
  return div;
}

// Compute a bezier path for an edge, dynamically routing around any blocking nodes.
// Works in both landscape (left→right) and portrait (top→bottom) layouts.
function computeEdgePath(pre, task) {
  if (portraitLayout) {
    // Vertical: from bottom-center of source to top-center of target
    const sx = (pre.x||0)+NW/2, sy = (pre.y||0)+NH;
    const tx = (task.x||0)+NW/2, ty = task.y||0;
    const cv = Math.max(40, Math.abs(ty-sy)*0.45);
    return `M${sx} ${sy} C${sx} ${sy+cv},${tx} ${ty-cv},${tx} ${ty}`;
  }

  const sx = (pre.x||0)+NW, sy = (pre.y||0)+NH/2;
  const tx = task.x||0,     ty = (task.y||0)+NH/2;

  // Single-step edges (adjacent layers): direct bezier, no routing needed
  if (tx - sx <= NW + H_GAP + 10) {
    const cv = Math.max(55, Math.abs(tx-sx)*0.45);
    return `M${sx} ${sy} C${sx+cv} ${sy},${tx-cv} ${ty},${tx} ${ty}`;
  }

  // Long edges: find nodes in intermediate x-range that the straight line would hit
  const blockers = [];
  Object.values(S.tasks).forEach(t => {
    if (t.id === pre.id || t.id === task.id) return;
    if (S.hideCompleted && t.completed) return;
    const nx = t.x||0, ny = t.y||0;
    if (nx + NW <= sx || nx >= tx) return; // outside x corridor
    const cx = nx + NW/2;
    const frac = (cx - sx) / (tx - sx);
    const lineY = sy + frac * (ty - sy);
    if (lineY >= ny - V_GAP*1.5 && lineY <= ny + NH + V_GAP*1.5) {
      blockers.push({cx, ny, lineY});
    }
  });

  if (!blockers.length) {
    const cv = Math.max(55, Math.abs(tx-sx)*0.45);
    return `M${sx} ${sy} C${sx+cv} ${sy},${tx-cv} ${ty},${tx} ${ty}`;
  }

  blockers.sort((a,b) => a.cx - b.cx);

  const pts = [{x:sx, y:sy}];
  for (const {cx, ny, lineY} of blockers) {
    const wy = lineY < ny + NH/2
      ? ny - V_GAP*1.5      // route above node
      : ny + NH + V_GAP*1.5; // route below node
    pts.push({x:cx, y:wy});
  }
  pts.push({x:tx, y:ty});

  let d = `M${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length-1; i++) {
    const p1=pts[i], p2=pts[i+1];
    const cv = Math.max(55, Math.abs(p2.x-p1.x)*0.45);
    d += ` C${p1.x+cv} ${p1.y},${p2.x-cv} ${p2.y},${p2.x} ${p2.y}`;
  }
  return d;
}

function renderEdges() {
  const svg = document.getElementById('edges-svg');

  const seen = new Set();
  let paths = '';
  Object.values(S.tasks).forEach(task => {
    if (S.hideCompleted && task.completed) return;
    task.prereqs.forEach(pid => {
      const pre = S.tasks[pid];
      if (!pre || (S.hideCompleted && pre.completed)) return;
      const eid = `${pid}>${task.id}`;
      if (seen.has(eid)) return;
      seen.add(eid);

      const d = computeEdgePath(pre, task);
      const cls = pre.completed ? ' class="edge-done"' : '';
      // Visual path (no pointer events — hit path below handles interaction)
      paths += `<path d="${d}" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#ab)"${cls} pointer-events="none"/>`;
      // Invisible wide hit path for disconnect-by-drag
      paths += `<path d="${d}" stroke="transparent" stroke-width="18" fill="none" class="edge-hit" data-pre="${pid}" data-dep="${task.id}" pointer-events="stroke"/>`;
    });
  });

  svg.innerHTML = `
    <defs>
      <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
      </marker>
    </defs>${paths}`;
}

// ── List ──────────────────────────────────────────────────
function listLayers() {
  const depth = {};
  const allTasks = Object.values(S.tasks);
  // When Hide Done is on, compute layers relative to visible tasks only —
  // completed prereqs are treated as "already done", so their dependents
  // become roots (layer 0 = "Starting tasks").
  const tasks = S.hideCompleted ? allTasks.filter(t => !t.completed) : allTasks;
  const taskSet = new Set(tasks.map(t => t.id));
  const roots = S.hideCompleted
    ? tasks.filter(t => t.prereqs.every(pid => !taskSet.has(pid)))
    : tasks.filter(t => t.prereqs.length === 0);
  const q = roots.map(t=>({id:t.id,d:0}));
  while (q.length) {
    const {id,d} = q.shift();
    if (depth[id]===undefined||d>depth[id]) {
      depth[id]=d;
      (S.tasks[id]?.dependents||[]).filter(dep=>taskSet.has(dep)).forEach(dep=>q.push({id:dep,d:d+1}));
    }
  }
  tasks.forEach(t=>{ if(depth[t.id]===undefined) depth[t.id]=0; });
  const by={};
  Object.entries(depth).forEach(([id,d])=>{ (by[d]||(by[d]=[])).push(S.tasks[id]); });
  return by;
}

function renderList() {
  const el = document.getElementById('list-view');
  const all = Object.values(S.tasks);
  if (!all.length) { el.innerHTML='<div class="list-empty"><p>No tasks yet. Press <strong>+ Add Task</strong> to get started.</p></div>'; return; }

  const total=all.length, done=all.filter(t=>t.completed).length, pct=Math.round((done/total)*100);
  const layers = listLayers();
  const keys = Object.keys(layers).map(Number).sort((a,b)=>a-b);
  const maxL = Math.max(...keys);

  let html = `<div class="list-inner">
    <div class="list-prog-wrap">
      <div class="list-prog-bar"><div class="list-prog-fill" style="width:${pct}%"></div></div>
      <span class="list-prog-label">${done} / ${total} complete</span>
    </div>`;

  keys.forEach(layer => {
    const tasks = layers[layer].filter(t => !S.hideCompleted || !t.completed);
    if (!tasks.length) return;
    const name = layer===0 ? 'Starting tasks' : layer===maxL ? 'Final tasks' : `Step ${layer+1}`;
    html += `<div class="list-layer"><div class="list-layer-hdr"><span class="list-layer-name">${esc(name)}</span><span class="list-layer-ct">${tasks.length} task${tasks.length!==1?'s':''}</span></div><div class="list-tasks">`;
    tasks.forEach(task => {
      const s=status(task), c=SC[s];
      const sl={completed:'Done',available:'Ready',blocked:'Waiting'}[s];
      const pre=task.prereqs.map(id=>S.tasks[id]?.title).filter(Boolean);
      const post=task.dependents.map(id=>S.tasks[id]?.title).filter(Boolean);
      const cbStyle=`border-color:${task.completed?'#94a3b8':'#cbd5e1'};background:${task.completed?'#94a3b8':'white'}`;
      const chk=task.completed?'<svg width="11" height="11" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
      html += `
        <div class="list-card" data-edit="${task.id}" style="background:${c.bg};border-color:${c.bd}">
          <div class="list-cb" data-cb="${task.id}" style="${cbStyle}">${chk}</div>
          <div class="list-body">
            <div class="list-row">
              <span class="list-title${task.completed?' done':''}">${esc(task.title)}</span>
              <span class="list-badge" style="color:${c.txt}"><span class="badge-dot" style="background:${c.dot}"></span>${sl}</span>
            </div>
            ${pre.length?`<div class="list-deps"><span class="dep-label">Needs:</span>${pre.map(t=>`<span class="dep-chip dep-pre">${esc(t)}</span>`).join('')}</div>`:''}
            ${post.length?`<div class="list-deps"><span class="dep-label">Unlocks:</span>${post.map(t=>`<span class="dep-chip dep-post">${esc(t)}</span>`).join('')}</div>`:''}
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// INTERACTIONS (pan / zoom / drag)
// ════════════════════════════════════════════════════════════
let VT = { x:40, y:40, scale:1 };
let panning=false, panSM={x:0,y:0}, panST={x:0,y:0}, panMoved=false;
let dragging=false, dragId=null, dragSM={x:0,y:0}, dragSP={x:0,y:0}, didDrag=false, lastDrag=false;
let connDragging=false, connFromId=null, connFromSide=null;
let pendingAddPos=null;
let selectedIds=new Set();
let marquee=false, marqueeStart={x:0,y:0}, marqueeCur={x:0,y:0}, marqueeMoved=false;
let spaceDown=false;
let touches=[], pinchDist0=0, pinchScale0=1, pinchPan0={x:0,y:0};

function applyVT() {
  const c=document.getElementById('flow-canvas');
  if(c) c.style.transform=`translate(${VT.x}px,${VT.y}px) scale(${VT.scale})`;
}

function toCanvas(sx, sy) {
  const r=document.getElementById('flow-outer').getBoundingClientRect();
  return { x:(sx-r.left-VT.x)/VT.scale, y:(sy-r.top-VT.y)/VT.scale };
}

function fitView() {
  const tasks=Object.values(S.tasks).filter(t=>!S.hideCompleted||!t.completed);
  if(!tasks.length) return;
  const outer=document.getElementById('flow-outer');
  if(!outer) return;
  const ow=outer.clientWidth, oh=outer.clientHeight;
  const xs=tasks.map(t=>t.x||0), ys=tasks.map(t=>t.y||0);
  const x0=Math.min(...xs)-PAD, y0=Math.min(...ys)-PAD;
  const x1=Math.max(...xs)+NW+PAD, y1=Math.max(...ys)+NH+PAD;
  const cw=x1-x0, ch=y1-y0;
  const sc=Math.min(ow/cw, oh/ch, 1.5);
  VT = { scale:sc, x:(ow-cw*sc)/2-x0*sc, y:(oh-ch*sc)/2-y0*sc };
  applyVT();
}

function updateSelectionClasses() {
  document.querySelectorAll('.flow-node').forEach(el=>{
    el.classList.toggle('selected', selectedIds.has(el.dataset.id));
  });
}

function deleteSelectedTasks() {
  selectedIds.forEach(id=>{
    if(!S.tasks[id]) return;
    const t=S.tasks[id];
    t.prereqs.forEach(pid=>{ if(S.tasks[pid]) S.tasks[pid].dependents=S.tasks[pid].dependents.filter(d=>d!==id); });
    t.dependents.forEach(did=>{ if(S.tasks[did]) S.tasks[did].prereqs=S.tasks[did].prereqs.filter(p=>p!==id); });
    delete S.tasks[id];
  });
  selectedIds.clear();
  persist(); render();
}

// isNew=true means the task was just created; cancel or empty title removes it entirely
function startInlineEdit(taskId, isNew) {
  const task=S.tasks[taskId];
  if(!task) return;
  const titleEl=document.querySelector(`.flow-node[data-id="${taskId}"] .node-title`);
  if(!titleEl) return;
  const input=document.createElement('input');
  input.className='node-title-input';
  input.value=isNew?'':task.title;
  input.placeholder='Task name…';
  titleEl.replaceWith(input);
  input.focus(); if(!isNew) input.select();
  let done=false;
  function finish(cancel) {
    if(done) return; done=true;
    const val=input.value.trim();
    if(cancel||!val) {
      if(isNew){ delete S.tasks[taskId]; renderFlow(); }
      else { renderFlow(); }
    } else {
      if(val!==task.title){ S.tasks[taskId].title=val; persist(); }
      renderFlow();
    }
  }
  input.addEventListener('blur', ()=>finish(false));
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); finish(false); }
    if(e.key==='Escape'){ e.stopPropagation(); finish(true); }
  });
}

function setupFlowEvents() {
  const outer=document.getElementById('flow-outer');
  outer.addEventListener('mousedown', onMD);
  window.addEventListener('mousemove', onMM);
  window.addEventListener('mouseup', onMU);
  outer.addEventListener('wheel', onWheel, {passive:false});
  outer.addEventListener('touchstart', onTS, {passive:false});
  outer.addEventListener('touchmove', onTM, {passive:false});
  outer.addEventListener('touchend', onTE, {passive:false});
  document.getElementById('flow-canvas').addEventListener('click', onCC);
  outer.addEventListener('dblclick', e=>{
    if(e.target.closest('.node-port')||e.target.closest('[data-editname]')) return;
    const nd=e.target.closest('.flow-node');
    if(nd){ startInlineEdit(nd.dataset.id, false); return; }
    // Empty canvas: create a new node at the click position and go straight to inline edit
    const pos=toCanvas(e.clientX,e.clientY);
    const id='tk'+Date.now();
    S.tasks[id]={ id, title:'', completed:false, prereqs:[], dependents:[],
      x:pos.x-NW/2, y:pos.y-NH/2 };
    renderFlow();
    requestAnimationFrame(()=>startInlineEdit(id, true));
  });
}

function onMD(e) {
  // Commit any active inline edit when clicking outside its node
  const activeEdit = document.querySelector('.node-title-input');
  if (activeEdit && !activeEdit.contains(e.target)) {
    activeEdit.blur();
    if (!e.target.closest('.flow-node')) return; // canvas click consumed by edit-commit
  }

  // Edge disconnect: left-click on a hit path — pull the edge off the nearer endpoint
  if (e.target.classList?.contains('edge-hit') && e.button === 0) {
    const preId = e.target.dataset.pre, depId = e.target.dataset.dep;
    const pre = S.tasks[preId], dep = S.tasks[depId];
    if (pre && dep) {
      const cp = toCanvas(e.clientX, e.clientY);
      const nearSrc = Math.hypot(cp.x-((pre.x||0)+NW), cp.y-((pre.y||0)+NH/2))
                    < Math.hypot(cp.x-(dep.x||0),       cp.y-((dep.y||0)+NH/2));
      pre.dependents = pre.dependents.filter(d => d !== depId);
      dep.prereqs    = dep.prereqs.filter(p => p !== preId);
      persist(); renderFlow();
      // Start a ghost drag from the surviving endpoint so the user can reconnect
      connDragging  = true;
      connFromId    = nearSrc ? depId : preId;
      connFromSide  = nearSrc ? 'pre' : 'post';
      document.getElementById('ghost-svg').style.display = 'block';
    }
    e.preventDefault(); e.stopPropagation(); return;
  }

  const port = e.target.closest('.node-port');
  if(port && e.button === 0) {
    connDragging=true; connFromId=port.dataset.node; connFromSide=port.dataset.port;
    document.getElementById('ghost-svg').style.display='block';
    e.preventDefault(); e.stopPropagation(); return;
  }
  if(e.target.closest('[data-editname]')) return; // pencil handled on click
  if(e.target.dataset.cb) return;                 // checkbox handled on click
  const nd = e.target.closest('.flow-node');
  if(nd && e.button === 0) {
    dragging=true; didDrag=false; dragId=nd.dataset.id;
    dragSM=toCanvas(e.clientX,e.clientY);
    const t=S.tasks[dragId]; dragSP={x:t.x||0,y:t.y||0};
    nd.classList.add('dragging'); e.preventDefault(); return;
  }
  // Empty canvas:
  //   Left button (or space) = pan the canvas
  //   Middle button          = marquee-select
  e.preventDefault();
  if (e.button === 1) {
    const r = document.getElementById('flow-outer').getBoundingClientRect();
    marqueeStart={x:e.clientX-r.left, y:e.clientY-r.top};
    marqueeCur={...marqueeStart}; marqueeMoved=false; marquee=true;
    document.getElementById('flow-outer').classList.add('marqueeing');
  } else {
    panning=true; panMoved=false; panSM={x:e.clientX,y:e.clientY}; panST={...VT};
    document.getElementById('flow-outer').classList.add('panning');
  }
}

function onMM(e) {
  if(connDragging&&connFromId) {
    const portEl=document.querySelector(`.node-port[data-node="${connFromId}"][data-port="${connFromSide}"]`);
    if(portEl) {
      const pr=portEl.getBoundingClientRect();
      const sx=pr.left+pr.width/2, sy=pr.top+pr.height/2;
      const ex=e.clientX, ey=e.clientY;
      const cv=Math.max(50,Math.abs(ex-sx)*0.45);
      const d=connFromSide==='post'
        ? `M${sx} ${sy} C${sx+cv} ${sy},${ex-cv} ${ey},${ex} ${ey}`
        : `M${sx} ${sy} C${sx-cv} ${sy},${ex+cv} ${ey},${ex} ${ey}`;
      document.getElementById('ghost-path').setAttribute('d',d);
      document.querySelectorAll('.flow-node.conn-target').forEach(n=>n.classList.remove('conn-target'));
      const over=document.elementFromPoint(ex,ey)?.closest('.flow-node');
      if(over&&over.dataset.id!==connFromId) over.classList.add('conn-target');
    }
    return;
  }
  if (dragging&&dragId) {
    const cp=toCanvas(e.clientX,e.clientY);
    const dx=cp.x-dragSM.x, dy=cp.y-dragSM.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2) didDrag=true;
    if(didDrag) {
      const t=S.tasks[dragId]; t.x=dragSP.x+dx; t.y=dragSP.y+dy;
      const nd=document.querySelector(`.flow-node[data-id="${dragId}"]`);
      if(nd){nd.style.left=t.x+'px'; nd.style.top=t.y+'px';}
      renderEdges();
    }
    return;
  }
  if(panning){
    const dx=e.clientX-panSM.x, dy=e.clientY-panSM.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4) panMoved=true;
    VT.x=panST.x+dx; VT.y=panST.y+dy; applyVT();
    return;
  }
  if(marquee) {
    const r=document.getElementById('flow-outer').getBoundingClientRect();
    marqueeCur={x:e.clientX-r.left, y:e.clientY-r.top};
    const dx=marqueeCur.x-marqueeStart.x, dy=marqueeCur.y-marqueeStart.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4) marqueeMoved=true;
    if(marqueeMoved) {
      const x=Math.min(marqueeStart.x,marqueeCur.x), y=Math.min(marqueeStart.y,marqueeCur.y);
      const mq=document.getElementById('marquee-rect');
      mq.style.cssText=`display:block;left:${x}px;top:${y}px;width:${Math.abs(dx)}px;height:${Math.abs(dy)}px`;
    }
  }
}

function onMU(e) {
  if(marquee) {
    const outer=document.getElementById('flow-outer');
    outer.classList.remove('marqueeing');
    document.getElementById('marquee-rect').style.display='none';
    if(marqueeMoved) {
      const r=outer.getBoundingClientRect();
      const c1=toCanvas(marqueeStart.x+r.left, marqueeStart.y+r.top);
      const c2=toCanvas(marqueeCur.x+r.left, marqueeCur.y+r.top);
      const mx1=Math.min(c1.x,c2.x), my1=Math.min(c1.y,c2.y);
      const mx2=Math.max(c1.x,c2.x), my2=Math.max(c1.y,c2.y);
      selectedIds.clear();
      Object.values(S.tasks).forEach(t=>{
        if(S.hideCompleted&&t.completed) return;
        const tx=t.x||0, ty=t.y||0;
        if(tx<mx2&&tx+NW>mx1&&ty<my2&&ty+NH>my1) selectedIds.add(t.id);
      });
      updateSelectionClasses();
    } else {
      selectedIds.clear(); updateSelectionClasses();
    }
    marquee=false; marqueeMoved=false; return;
  }
  if(connDragging) {
    document.getElementById('ghost-svg').style.display='none';
    document.querySelectorAll('.flow-node.conn-target').forEach(n=>n.classList.remove('conn-target'));
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const targetNd=el?.closest('.flow-node');
    if(targetNd&&targetNd.dataset.id!==connFromId) {
      const targetId=targetNd.dataset.id;
      let preId, depId;
      if(connFromSide==='post'){ preId=connFromId; depId=targetId; }
      else { preId=targetId; depId=connFromId; }
      if(!wouldCycle(preId,depId)) {
        const pre=S.tasks[preId], dep=S.tasks[depId];
        if(pre&&dep&&!pre.dependents.includes(depId)) {
          pre.dependents.push(depId); dep.prereqs.push(preId);
          persist(); render();
        }
      }
    }
    connDragging=false; connFromId=null; connFromSide=null;
    return;
  }
  if(dragging){
    lastDrag=didDrag;
    if(didDrag) persist();
    const nd=dragId&&document.querySelector(`.flow-node[data-id="${dragId}"]`);
    if(nd) nd.classList.remove('dragging');
    dragging=false; didDrag=false; dragId=null;
  } else {
    lastDrag=false;
  }
  if(panning){
    if(!panMoved){ selectedIds.clear(); updateSelectionClasses(); }
    panMoved=false; panning=false;
    document.getElementById('flow-outer').classList.remove('panning');
  }
}

function onWheel(e) {
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.1;
  const ns=Math.min(3,Math.max(0.15,VT.scale*f));
  const r=document.getElementById('flow-outer').getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  VT.x=mx-(mx-VT.x)*(ns/VT.scale); VT.y=my-(my-VT.y)*(ns/VT.scale); VT.scale=ns; applyVT();
}

function dist2(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}

function onTS(e) {
  touches=Array.from(e.touches);
  if(touches.length===1){
    const t=touches[0];
    const nd=t.target.closest('.flow-node');
    if(nd&&!t.target.dataset.cb){
      dragging=true; didDrag=false; dragId=nd.dataset.id;
      dragSM=toCanvas(t.clientX,t.clientY);
      const tk=S.tasks[dragId]; dragSP={x:tk.x||0,y:tk.y||0}; return;
    }
    panning=true; panSM={x:t.clientX,y:t.clientY}; panST={...VT};
  } else if(touches.length===2){
    panning=false; dragging=false;
    pinchDist0=dist2(touches[0],touches[1]); pinchScale0=VT.scale;
    pinchPan0={...VT};
  }
}

function onTM(e) {
  e.preventDefault(); touches=Array.from(e.touches);
  if(touches.length===1){
    const t=touches[0];
    if(dragging&&dragId){
      const cp=toCanvas(t.clientX,t.clientY);
      const dx=cp.x-dragSM.x, dy=cp.y-dragSM.y;
      if(Math.abs(dx)>2||Math.abs(dy)>2) didDrag=true;
      if(didDrag){
        const tk=S.tasks[dragId]; tk.x=dragSP.x+dx; tk.y=dragSP.y+dy;
        const nd=document.querySelector(`.flow-node[data-id="${dragId}"]`);
        if(nd){nd.style.left=tk.x+'px'; nd.style.top=tk.y+'px';} renderEdges();
      }
    } else if(panning){
      VT.x=panST.x+(t.clientX-panSM.x); VT.y=panST.y+(t.clientY-panSM.y); applyVT();
    }
  } else if(touches.length===2){
    const d=dist2(touches[0],touches[1]);
    const ns=Math.min(3,Math.max(0.15,pinchScale0*(d/pinchDist0)));
    const mx=(touches[0].clientX+touches[1].clientX)/2;
    const my=(touches[0].clientY+touches[1].clientY)/2;
    const r=document.getElementById('flow-outer').getBoundingClientRect();
    const cx=mx-r.left, cy=my-r.top;
    VT.x=cx-(cx-pinchPan0.x)*(ns/pinchScale0);
    VT.y=cy-(cy-pinchPan0.y)*(ns/pinchScale0);
    VT.scale=ns; applyVT();
  }
}

function onTE() {
  if(dragging){ if(didDrag)persist(); dragging=false; didDrag=false; dragId=null; }
  panning=false;
}

function onCC(e) {
  if(e.target.closest('#edges-svg')) { lastDrag=false; return; } // edge clicks handled in onMD
  if(e.target.closest('.node-port')) return;
  const editBtn=e.target.closest('[data-editname]');
  if(editBtn){ e.stopPropagation(); openTaskModal(editBtn.dataset.editname); return; }
  if(lastDrag){ lastDrag=false; return; }
  const cb=e.target.closest('[data-cb]');
  if(cb){ e.stopPropagation(); toggleTask(cb.dataset.cb); return; }
  const nd=e.target.closest('.flow-node');
  if(nd) {
    if(e.shiftKey) {
      if(selectedIds.has(nd.dataset.id)) selectedIds.delete(nd.dataset.id);
      else selectedIds.add(nd.dataset.id);
    } else {
      selectedIds.clear(); selectedIds.add(nd.dataset.id);
    }
    updateSelectionClasses();
  } else {
    // click on empty canvas — deselect all
    selectedIds.clear(); updateSelectionClasses();
  }
  lastDrag=false;
}

// ════════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════════
let mId=null, mPre=[], mPost=[];

function openTaskModal(editId) {
  mId=editId; mPre=[]; mPost=[];
  const task=editId?S.tasks[editId]:null;
  if(task){ mPre=[...task.prereqs]; mPost=[...task.dependents]; }

  document.getElementById('modal-title-hdr').textContent = editId?'Edit Task':'New Task';
  document.getElementById('m-save-btn').textContent = editId?'Save changes':'Add task';
  document.getElementById('m-title').value = task?.title||'';
  document.getElementById('m-title').classList.remove('err');
  document.getElementById('m-title-err').style.display='none';
  document.getElementById('m-delete-wrap').innerHTML = editId
    ? `<button class="btn btn-danger" onclick="handleDelete()">Delete task</button>`
    : '';

  refreshChips();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-title').focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  mId=null; mPre=[]; mPost=[];
  document.getElementById('pre-search').value='';
  document.getElementById('post-search').value='';
  document.getElementById('pre-dd').style.display='none';
  document.getElementById('post-dd').style.display='none';
}

function refreshChips() {
  const pc=document.getElementById('pre-chips');
  pc.innerHTML=mPre.map(id=>{const t=S.tasks[id]; return t?`<span class="chip chip-pre">${esc(t.title)}<button class="chip-rm" onclick="rmPre('${id}')">&times;</button></span>`:''}).join('');
  const oc=document.getElementById('post-chips');
  oc.innerHTML=mPost.map(id=>{const t=S.tasks[id]; return t?`<span class="chip chip-post">${esc(t.title)}<button class="chip-rm" onclick="rmPost('${id}')">&times;</button></span>`:''}).join('');
}

function rmPre(id){ mPre=mPre.filter(i=>i!==id); refreshChips(); }
function rmPost(id){ mPost=mPost.filter(i=>i!==id); refreshChips(); }

function showDd(ddId, inputEl, selected, onPick, cycleCheck) {
  const dd=document.getElementById(ddId);
  const q=inputEl.value.toLowerCase();
  const excluded=new Set([mId, ...mPre, ...mPost].filter(Boolean));
  const opts=Object.values(S.tasks).filter(t=>!excluded.has(t.id)&&t.title.toLowerCase().includes(q)).slice(0,50);
  if(!opts.length){dd.style.display='none'; return;}

  const r=inputEl.getBoundingClientRect();
  dd.style.left=r.left+'px'; dd.style.width=r.width+'px';
  const below=window.innerHeight-r.bottom;
  if(below>=200){dd.style.top=(r.bottom+4)+'px'; dd.style.bottom='auto';}
  else{dd.style.top='auto'; dd.style.bottom=(window.innerHeight-r.top+4)+'px';}

  dd.innerHTML=opts.map(t=>{
    const c=SC[status(t)];
    return `<li class="ms-opt" data-id="${t.id}"><span class="opt-dot" style="background:${c.dot}"></span>${esc(t.title)}</li>`;
  }).join('');
  dd.style.display='block';
}

function setupSearchInput(inputId, ddId, getSelected, onPick) {
  const input=document.getElementById(inputId);
  const dd=document.getElementById(ddId);
  input.addEventListener('input', ()=>showDd(ddId, input, getSelected(), onPick));
  input.addEventListener('focus', ()=>showDd(ddId, input, getSelected(), onPick));
  input.addEventListener('keydown', e=>{
    if(e.key==='Escape'){dd.style.display='none'; input.value='';}
    if(e.key==='Enter'){
      e.preventDefault();
      const first=dd.querySelector('.ms-opt');
      if(first){onPick(first.dataset.id); input.value=''; dd.style.display='none';}
    }
  });
  dd.addEventListener('mousedown', e=>{
    e.preventDefault();
    const li=e.target.closest('.ms-opt');
    if(li){onPick(li.dataset.id); input.value=''; dd.style.display='none';}
  });
}

function handleSave() {
  const titleEl=document.getElementById('m-title');
  const title=titleEl.value.trim();
  if(!title){
    titleEl.classList.add('err');
    document.getElementById('m-title-err').style.display='block';
    titleEl.focus(); return;
  }
  if(mId) editTask(mId, title, mPre, mPost);
  else addTask(title, mPre, mPost);
  closeModal();
  if(S.view==='flow') setTimeout(fitView, 50);
}

function handleDelete() {
  if(!mId) return;
  const t=S.tasks[mId];
  if(confirm(`Delete "${t?.title}"? This cannot be undone.`)){
    deleteTask(mId); closeModal();
  }
}

// Close dropdown on outside click
document.addEventListener('mousedown', e=>{
  ['pre-dd','post-dd'].forEach(id=>{
    const dd=document.getElementById(id);
    const inp=document.getElementById(id==='pre-dd'?'pre-search':'post-search');
    if(dd&&inp&&!dd.contains(e.target)&&!inp.contains(e.target)) dd.style.display='none';
  });
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ selectedIds.clear(); updateSelectionClasses(); closeModal(); }
  if((e.key==='Delete'||e.key==='Backspace')&&!e.target.matches('input,textarea')){
    if(!document.getElementById('modal-overlay').classList.contains('open')&&selectedIds.size>0){
      deleteSelectedTasks();
    }
  }
  if(e.key===' '&&!e.target.matches('input,textarea')){
    e.preventDefault();
    if(!spaceDown){ spaceDown=true; document.body.classList.add('pan-mode'); }
  }
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'&&!e.target.matches('input,textarea')){
    e.preventDefault();
    if(e.shiftKey) redo(); else undo();
  }
});
document.addEventListener('keyup', e=>{
  if(e.key===' '){ spaceDown=false; document.body.classList.remove('pan-mode'); }
});

// Enter key on modal title
document.getElementById('m-title').addEventListener('keydown', e=>{
  if(e.key==='Enter') handleSave();
});

// ════════════════════════════════════════════════════════════
// LIST CLICK DELEGATION
// ════════════════════════════════════════════════════════════
document.getElementById('list-view').addEventListener('click', e=>{
  const cb=e.target.closest('[data-cb]');
  if(cb){e.stopPropagation(); toggleTask(cb.dataset.cb); return;}
  const card=e.target.closest('[data-edit]');
  if(card) openTaskModal(card.dataset.edit);
});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
async function init() {
  if (!(await tryLoadFromHash())) initState();
  if (Object.values(S.tasks).some(t=>t.x===undefined)) doLayout();
  if(history.length===0){ history=[JSON.stringify(S.tasks)]; historyIndex=0; }
  document.getElementById('modal-overlay').addEventListener('mousedown', e=>{
    if(e.target===document.getElementById('modal-overlay')) closeModal();
  });
  setupFlowEvents();
  setupSearchInput('pre-search','pre-dd',()=>mPre, id=>{
    if(!wouldCycle(id, mId||'_')){ mPre.push(id); refreshChips(); }
    showDd('pre-dd', document.getElementById('pre-search'), mPre, null);
  });
  setupSearchInput('post-search','post-dd',()=>mPost, id=>{
    if(!wouldCycle(mId||'_', id)){ mPost.push(id); refreshChips(); }
    showDd('post-dd', document.getElementById('post-search'), mPost, null);
  });
  render();
  setTimeout(fitView, 80);
}

// ════════════════════════════════════════════════════════════
// URL EXPORT / SHARE
// ════════════════════════════════════════════════════════════

// URL helpers — v2 uses deflate-raw compression for ~3-4× smaller URLs.
// v1 (uncompressed) links are still decoded for backward compatibility.
async function compress(str) {
  const bytes = new TextEncoder().encode(str);
  const cs = new CompressionStream('deflate-raw');
  const w = cs.writable.getWriter(); w.write(bytes); w.close();
  const buf = await new Response(cs.readable).arrayBuffer();
  const arr = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < arr.length; i += 8192)
    bin += String.fromCharCode(...arr.subarray(i, i+8192));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function decompress(s) {
  const pad = s.length % 4 ? '='.repeat(4 - s.length % 4) : '';
  const bin = atob(s.replace(/-/g,'+').replace(/_/g,'/') + pad);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  const ds = new DecompressionStream('deflate-raw');
  const w = ds.writable.getWriter(); w.write(bytes); w.close();
  return new Response(ds.readable).text();
}

function decodeV1(s) {
  const pad = s.length % 4 ? '='.repeat(4 - s.length % 4) : '';
  return decodeURIComponent(atob(s.replace(/-/g,'+').replace(/_/g,'/') + pad)
    .split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));
}

// Called at startup — returns true if state was loaded from the URL hash.
// The hash is a one-time import: after loading we clear it so reloads use localStorage.
async function tryLoadFromHash() {
  try {
    const mv2 = location.hash.match(/^#v2=(.+)$/);
    const mv1 = !mv2 && location.hash.match(/^#v1=(.+)$/);
    if (!mv2 && !mv1) return false;
    const json = mv2 ? await decompress(mv2[1]) : decodeV1(mv1[1]);
    const data = JSON.parse(json);
    if (!data?.tasks || typeof data.tasks !== 'object') return false;
    S = { view:'flow', hideCompleted: !!data.hideCompleted, tasks: data.tasks };
    persist();
    history.replaceState(null, '', location.pathname + location.search);
    return true;
  } catch(e) { return false; }
}

// Encode current board state into a shareable URL and copy to clipboard.
async function shareBoard() {
  const payload = { tasks: S.tasks, hideCompleted: S.hideCompleted };
  const enc = await compress(JSON.stringify(payload));
  const url = location.href.split('#')[0] + '#v2=' + enc;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link copied to clipboard!');
  } catch(e) {
    prompt('Copy this link:', url);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('DOMContentLoaded', init);
